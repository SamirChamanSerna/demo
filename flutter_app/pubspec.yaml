name: flutter_wasm_demo
description: "PoC: Flutter Web + C# NativeAOT Wasm"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # package:web para interoperabilidad web moderna.
  web: ^0.5.0
  # package:ffi para interoperabilidad nativa en Windows y Android.
  ffi: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
